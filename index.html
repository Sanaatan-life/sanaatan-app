<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanaatan — Ask the Scriptures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:#FAF6EF;--warm-white:#FFFDF8;--ink:#1C1208;
      --ink-soft:#3D2B00;--gold:#8B6000;--gold-mid:#A07010;
      --border:#DDD0B8;--muted:#6B5C3E;--user-bg:#8B6000;--user-text:#FFFDF8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--cream);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.7;display:flex;flex-direction:column;}

    /* HEADER */
    header{background:var(--warm-white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .diamond-mark{width:10px;height:10px;background:var(--gold);transform:rotate(45deg);}
    .brand-text h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:0.06em;line-height:1;}
    .brand-text p{font-family:'Tiro Devanagari Hindi',serif;font-size:13px;color:var(--gold);letter-spacing:0.1em;}
    .home-btn{margin-left:auto;font-size:18px;text-decoration:none;padding:4px 8px;border-radius:8px;transition:background 0.2s;}
    .home-btn:hover{background:var(--border);}
    .beta-badge{margin-left:8px;background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:4px 12px;font-size:12px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

    /* CHAT AREA */
    #chatArea{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;}

    /* WELCOME */
    .welcome{text-align:center;padding:32px 16px;max-width:720px;margin:0 auto;width:100%;}
    .welcome h2{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,26px);font-weight:400;font-style:italic;color:var(--ink-soft);margin-bottom:12px;line-height:1.5;}
    .welcome p{font-size:16px;color:var(--muted);margin-bottom:24px;}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:600px;margin:0 auto;}
    .chip{background:var(--warm-white);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:14px;color:var(--ink-soft);cursor:pointer;font-family:'Source Serif 4',serif;transition:all 0.2s;}
    .chip:hover{border-color:var(--gold);color:var(--gold);}

    /* MESSAGES */
    .msg{display:flex;flex-direction:column;max-width:720px;width:100%;margin:0 auto;}
    .msg.user{align-self:flex-end;max-width:min(500px,72%);margin:0 0 0 auto;width:auto;}
    .msg.assistant{align-self:flex-start;width:100%;max-width:720px;margin:0 auto;}
    .msg-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;color:var(--muted);}
    .msg.user .msg-label{text-align:right;color:var(--gold);}
    .msg-bubble{padding:14px 20px;border-radius:16px;font-size:16px;line-height:1.8;}
    .msg.user .msg-bubble{background:var(--user-bg);color:var(--user-text);border-top-right-radius:4px;font-family:'Playfair Display',serif;font-style:italic;}
    .msg.assistant .msg-bubble{background:var(--warm-white);color:var(--ink-soft);border:1px solid var(--border);border-top-left-radius:4px;width:100%;}

    /* TYPING */
    .typing{max-width:720px;width:100%;margin:0 auto;}
    .typing-dots{display:flex;gap:6px;align-items:center;background:var(--warm-white);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;padding:14px 20px;width:fit-content;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:0.5;animation:typingPulse 1.3s ease-in-out infinite;}
    .dot:nth-child(2){animation-delay:0.2s;}
    .dot:nth-child(3){animation-delay:0.4s;}
    .error-msg{max-width:720px;width:100%;margin:0 auto;background:#FDF0EC;border:1px solid #C0392B;border-radius:10px;padding:12px 20px;font-size:14px;color:#8B1A1A;text-align:center;}

    /* FOOTER */
    footer{background:var(--warm-white);border-top:1px solid var(--border);padding:14px 20px 20px;flex-shrink:0;}
    .input-wrap{display:flex;max-width:720px;margin:0 auto;border:2px solid var(--border);border-radius:12px;overflow:hidden;background:var(--cream);transition:border-color 0.2s;}
    .input-wrap:focus-within{border-color:var(--gold);}
    textarea{flex:1;background:transparent;border:none;padding:14px 18px;resize:none;font-family:'Source Serif 4',serif;font-size:17px;color:var(--ink);outline:none;max-height:120px;line-height:1.5;}
    textarea::placeholder{color:#B0A090;font-style:italic;}
    #sendBtn{background:var(--gold);border:none;border-left:2px solid var(--border);padding:14px 20px;cursor:pointer;color:white;font-size:20px;transition:background 0.2s;flex-shrink:0;}
    #sendBtn:hover{background:var(--gold-mid);}
    #sendBtn:disabled{background:var(--border);cursor:not-allowed;}
    .input-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:8px;}

    /* FOLLOW-UP CHIPS */
    .followup-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;max-width:720px;width:100%;margin-left:auto;margin-right:auto;}
    .followup-chip{background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--ink-soft);cursor:pointer;font-family:'Source Serif 4',serif;transition:all 0.2s;}
    .followup-chip:hover{border-color:var(--gold);color:var(--gold);}

    @keyframes typingPulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.1)}}
    @media(max-width:520px){header{padding:10px 16px;}#chatArea{padding:16px 12px;}footer{padding:10px 12px 16px;}}
  </style>
</head>
<body>
  <header>
    <div><div class="diamond-mark"></div></div>
    <div class="brand-text"><h1>SANAATAN</h1><p>सनातन · The Eternal Way</p></div>
    <a href="https://sanaatan.life" class="home-btn" title="Home">🏠</a>
    <span class="beta-badge">Beta</span>
  </header>
  <div id="chatArea">
    <div class="welcome" id="welcome">
      <h2>What does your heart seek to understand?</h2>
      <p>Ask anything from the Bhagavad Gita or Upanishads.<br/>Answers are grounded in the actual verses, with citations.</p>
      <div class="suggestions">
        <button class="chip" onclick="ask('What does Krishna say about performing duty without attachment?')">On duty without attachment</button>
        <button class="chip" onclick="ask('How should one deal with grief and fear of death?')">On grief and death</button>
        <button class="chip" onclick="ask('What is the nature of the eternal soul?')">On the eternal soul</button>
        <button class="chip" onclick="ask('How can I control my wandering mind?')">On controlling the mind</button>
        <button class="chip" onclick="ask('What does the Gita say about fear?')">On fear</button>
        <button class="chip" onclick="ask('What is moksha and how does one attain it?')">On moksha</button>
      </div>
    </div>
  </div>
  <footer>
    <div class="input-wrap">
      <textarea id="questionInput" placeholder="Ask your question here…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendQuestion()" disabled>➤</button>
    </div>
    <p class="input-hint">Press Enter to ask · Shift+Enter for new line · app.sanaatan.life</p>
  </footer>
  <script>
    const BACKEND = '';
const chatArea = document.getElementById('chatArea');
const input    = document.getElementById('questionInput');
const sendBtn  = document.getElementById('sendBtn');
window.addEventListener('load', () => input.focus());

    input.addEventListener('input', () => {
      sendBtn.disabled = input.value.trim().length === 0;
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    }

    function ask(q) {
      input.value = q;
      sendBtn.disabled = false;
      sendQuestion();
    }

    const followupSuggestions = [
      "Can you explain this verse in simpler terms?",
      "What does this mean for daily life?",
      "Which other scriptures speak on this?",
      "How did Krishna explain this to Arjuna?",
      "What is the Sanskrit word for this concept?",
      "Tell me more about this teaching"
    ];

    function addFollowupChips() {
      const existing = document.getElementById('followup-chips');
      if (existing) existing.remove();
      const container = document.createElement('div');
      container.className = 'followup-chips';
      container.id = 'followup-chips';
      const shuffled = followupSuggestions.sort(() => 0.5 - Math.random()).slice(0, 3);
      shuffled.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'followup-chip';
        btn.textContent = q;
        btn.onclick = () => ask(q);
        container.appendChild(btn);
      });
      chatArea.appendChild(container);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addMessage(role, text) {
      const w = document.getElementById('welcome');
      if (w) w.remove();
      const existing = document.getElementById('followup-chips');
      if (existing) existing.remove();
      const d = document.createElement('div');
      d.className = 'msg ' + role;
      const l = document.createElement('div');
      l.className = 'msg-label';
      l.textContent = role === 'user' ? 'You' : 'Sanaatan';
      const b = document.createElement('div');
      b.className = 'msg-bubble';
      if (role === 'assistant') {
        b.innerHTML = text
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.*?)\*/g,'<em>$1</em>')
          .replace(/^## (.*?)$/gm,'<h3 style="font-family:\'Playfair Display\',serif;font-size:18px;color:#1C1208;margin:12px 0 6px;">$1</h3>')
          .replace(/^### (.*?)$/gm,'<h4 style="font-size:16px;color:#3D2B00;margin:10px 0 4px;">$1</h4>')
          .replace(/\n/g,'<br>');
      } else {
        b.textContent = text;
      }
      d.appendChild(l);
      d.appendChild(b);
      chatArea.appendChild(d);
      if (role === 'assistant') {
        setTimeout(() => {
          addFollowupChips();
          setTimeout(() => {
            const top = d.getBoundingClientRect().top + chatArea.scrollTop - chatArea.getBoundingClientRect().top - 24;
            chatArea.scrollTo({ top: top, behavior: 'smooth' });
          }, 100);
        }, 200);
      } else {
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    function addTyping() {
      const d = document.createElement('div');
      d.className = 'typing'; d.id = 'typing';
      d.innerHTML = '<div class="msg-label">Sanaatan</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      chatArea.appendChild(d);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function addError(msg) {
      const d = document.createElement('div');
      d.className = 'error-msg';
      d.textContent = msg;
      chatArea.appendChild(d);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendQuestion() {
      const question = input.value.trim();
      if (!question || sendBtn.disabled) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage('user', question);
      addTyping();
      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: 5 })
        });
        removeTyping();
        const text = await res.text();
        let answer;
        try {
          const data = JSON.parse(text);
          answer = data.answer || data.error || text;
        } catch { answer = text; }
        addMessage('assistant', answer);
      } catch (err) {
        removeTyping();
        addError('Something went wrong connecting to the scriptures. Please try again.');
        console.error(err);
      }
    }
  </script>
</body>
</html>
