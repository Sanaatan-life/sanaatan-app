<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanaatan — Ask the Scriptures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:#FAF6EF;--warm-white:#FFFDF8;--ink:#1C1208;
      --ink-soft:#3D2B00;--gold:#8B6000;--gold-mid:#A07010;
      --gold-light:#C49A20;--border:#DDD0B8;--muted:#6B5C3E;
      --green:#2E5C3A;--user-bg:#8B6000;--user-text:#FFFDF8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--cream);color:var(--ink);
      font-family:'Source Serif 4',Georgia,serif;
      font-size:17px;line-height:1.7;display:flex;flex-direction:column;}

    /* Header */
    header{
      background:var(--warm-white);
      border-bottom:1px solid var(--border);
      padding:14px 24px;
      display:flex;align-items:center;gap:14px;
      flex-shrink:0;
    }
    .brand-mark{
      display:flex;flex-direction:column;align-items:center;gap:2px;
    }
    .diamond-mark{
      width:10px;height:10px;background:var(--gold);
      transform:rotate(45deg);
    }
    .brand-text h1{
      font-family:'Playfair Display',serif;
      font-size:22px;font-weight:700;color:var(--ink);
      letter-spacing:0.06em;line-height:1;
    }
    .brand-text p{
      font-family:'Tiro Devanagari Hindi',serif;
      font-size:13px;color:var(--gold);letter-spacing:0.1em;
    }
    .beta-badge{
      margin-left:auto;
      background:var(--warm-white);border:1px solid var(--border);
      border-radius:12px;padding:4px 12px;
      font-size:12px;color:var(--muted);letter-spacing:0.1em;
      text-transform:uppercase;
    }

    /* Chat area */
    #chatArea{
      flex:1;overflow-y:auto;
      padding:24px 20px;
      display:flex;flex-direction:column;gap:20px;
    }

    /* Welcome */
    .welcome{
      text-align:center;padding:32px 16px;
      animation:fadeUp 0.6s ease-out both;
    }
    .welcome h2{
      font-family:'Playfair Display',serif;
      font-size:clamp(20px,4vw,26px);font-weight:400;font-style:italic;
      color:var(--ink-soft);margin-bottom:12px;line-height:1.5;
    }
    .welcome p{font-size:16px;color:var(--muted);margin-bottom:24px;}

    /* Suggestion chips */
    .suggestions{
      display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
      max-width:600px;margin:0 auto;
    }
    .chip{
      background:var(--warm-white);border:1px solid var(--border);
      border-radius:20px;padding:8px 16px;
      font-size:14px;color:var(--ink-soft);cursor:pointer;
      font-family:'Source Serif 4',serif;
      transition:all 0.2s;text-align:left;
    }
    .chip:hover{border-color:var(--gold);color:var(--gold);background:var(--cream);}

    /* Messages */
    .msg{
      display:flex;flex-direction:column;
      max-width:min(680px,92%);
      animation:fadeUp 0.35s ease-out both;
    }
    .msg.user{align-self:flex-end;}
    .msg.assistant{align-self:flex-start;}

    .msg-label{
      font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
      margin-bottom:6px;color:var(--muted);
    }
    .msg.user .msg-label{text-align:right;color:var(--gold);}

    .msg-bubble{
      padding:14px 20px;border-radius:16px;
      font-size:16px;line-height:1.8;
      white-space:pre-wrap;
    }
    .msg.user .msg-bubble{
      background:var(--user-bg);color:var(--user-text);
      border-top-right-radius:4px;
      font-family:'Playfair Display',serif;font-style:italic;
    }
    .msg.assistant .msg-bubble{
      background:var(--warm-white);color:var(--ink-soft);
      border:1px solid var(--border);
      border-top-left-radius:4px;
    }

    /* Typing indicator */
    .typing{align-self:flex-start;}
    .typing-dots{
      display:flex;gap:6px;align-items:center;
      background:var(--warm-white);border:1px solid var(--border);
      border-radius:16px;border-top-left-radius:4px;
      padding:14px 20px;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--gold);opacity:0.5;
      animation:typingPulse 1.3s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:0.2s;}
    .dot:nth-child(3){animation-delay:0.4s;}

    /* Error */
    .error-msg{
      align-self:center;
      background:#FDF0EC;border:1px solid #C0392B;
      border-radius:10px;padding:12px 20px;
      font-size:14px;color:#8B1A1A;max-width:500px;text-align:center;
    }

    /* Input bar */
    footer{
      background:var(--warm-white);
      border-top:1px solid var(--border);
      padding:14px 20px 20px;
      flex-shrink:0;
    }
    .input-wrap{
      display:flex;gap:0;max-width:720px;margin:0 auto;
      border:2px solid var(--border);border-radius:12px;
      overflow:hidden;background:var(--cream);
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .input-wrap:focus-within{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(139,96,0,0.08);
    }
    textarea{
      flex:1;background:transparent;border:none;
      padding:14px 18px;resize:none;
      font-family:'Source Serif 4',serif;
      font-size:17px;color:var(--ink);
      outline:none;max-height:120px;
      line-height:1.5;
    }
    textarea::placeholder{color:#B0A090;font-style:italic;}
    #sendBtn{
      background:var(--gold);border:none;
      border-left:2px solid var(--border);
      padding:14px 20px;cursor:pointer;
      color:white;font-size:20px;
      transition:background 0.2s;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    #sendBtn:hover{background:var(--gold-mid);}
    #sendBtn:disabled{background:var(--border);cursor:not-allowed;}
    .input-hint{
      text-align:center;font-size:12px;color:var(--muted);
      margin-top:8px;max-width:720px;margin-left:auto;margin-right:auto;
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes typingPulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.1)}}

    @media(max-width:520px){
      header{padding:10px 16px;}
      #chatArea{padding:16px 12px;}
      footer{padding:10px 12px 16px;}
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand-mark">
      <div class="diamond-mark"></div>
    </div>
    <div class="brand-text">
      <h1>SANAATAN</h1>
      <p>सनातन · The Eternal Way</p>
    </div>
    <span class="beta-badge">Beta</span>
  </header>

  <!-- Chat -->
  <div id="chatArea">
    <div class="welcome" id="welcome">
      <h2>What does your heart seek to understand?</h2>
      <p>Ask anything from the Bhagavad Gita, Ramayana, or Upanishads.<br/>Answers are grounded in the actual verses, with citations.</p>
      <div class="suggestions">
        <button class="chip" onclick="ask('What does Krishna say about performing duty without attachment?')">On duty without attachment</button>
        <button class="chip" onclick="ask('How should one deal with grief and fear of death?')">On grief and death</button>
        <button class="chip" onclick="ask('What is the nature of the eternal soul?')">On the eternal soul</button>
        <button class="chip" onclick="ask('How can I control my wandering mind?')">On controlling the mind</button>
        <button class="chip" onclick="ask('What does the Gita say about fear?')">On fear</button>
        <button class="chip" onclick="ask('What is moksha and how does one attain it?')">On moksha</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <footer>
    <div class="input-wrap">
      <textarea
        id="questionInput"
        placeholder="Ask your question here…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendQuestion()" disabled>➤</button>
    </div>
    <p class="input-hint">Press Enter to ask · Shift+Enter for new line · app.sanaatan.life</p>
  </footer>

  <script>
    const BACKEND = 'https://cold-math-896b.varunmahipal.workers.dev';
const HEADERS = {
  'Content-Type': 'application/json',
  'Accept': 'application/json'};

    const chatArea = document.getElementById('chatArea');
    const input    = document.getElementById('questionInput');
    const sendBtn  = document.getElementById('sendBtn');

    // Enable send button when there is text
    input.addEventListener('input', () => {
      sendBtn.disabled = input.value.trim().length === 0;
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    }

    function ask(question) {
      input.value = question;
      sendBtn.disabled = false;
      sendQuestion();
    }

    function addMessage(role, text) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = 'msg ' + role;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : 'Sanaatan';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      div.appendChild(label);
      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<div class="msg-label">Sanaatan</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function addError(msg) {
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = msg;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    aconst res = await fetch(BACKEND + '/ask', {
  method: 'POST',
  headers: HEADERS,
  mode: 'cors',
  body: JSON.stringify({ question, top_k: 5 })
});
= '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', question);
      addTyping();

      try {
        const res = await fetch(BACKEND + '/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: 5 })
        });

        removeTyping();

        if (!res.ok) {
          throw new Error('Server returned ' + res.status);
        }

        const data = await res.json();
        addMessage('assistant', data.answer);

      } catch (err) {
        removeTyping();
        addError('Something went wrong connecting to the scriptures. Please try again.');
        console.error(err);
      }
    }
  </script>

</body>
</html>
